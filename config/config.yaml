ble:
  device_name: KP4PRA
  enabled: true
  start_at_boot: true
bluetooth:
  auto_discoverable: false
  auto_pairable: false
  bluez_state_strategy: persistent_bind_mount
debug:
  verbose_stdout: false
direwolf:
  host: 127.0.0.1
  port: 8001
dns_sd:
  instance_name: KP4PRA
paths:
  bluez_state: /rw/kp4pra-tnc/bluetooth
  config: /rw/kp4pra-tnc/config.yaml
  data: /rw/kp4pra-tnc/data
  runtime: /run/kp4pra-tnc
  state: /rw/kp4pra-tnc/state
product_name: KP4PRA TNC
rfcomm:
  channel: 1
  device_name: KP4PRA
  enabled: true
  start_at_boot: true
station:
  aliasssid: ''
  calias: CDIGI
  callsign: N0CALL
  morse_id_enabled: true   # blink callsign in Morse on the ACT LED every 15 min when operational
  clock: ''
  lat: 0.0
  lon: 0.0
  mygrid: ''
  ptt: CM108
  ptt_param: ''
  sound: ''
  ssid: ''
web:
  auth_enabled: false
  host: 0.0.0.0
  password: ""
  port: 8088
  username: admin

# WiFi access point (field mode). The TNC can broadcast its own network
# so a phone can join and reach the web UI at http://172.16.0.1/ with no
# home WiFi. Switch modes: sudo kp4pra-wifi-mode ap|client
wifi:
  # --- Access Point (the KP4PRA hotspot the TNC broadcasts) ---
  ssid: ''                  # AP SSID (blank -> defaults to KP4PRA)
  password: "qwerty1234"    # AP password - CHANGE THIS, default is public
  channel: 6
  mode_at_boot: "client"    # "client" = join configured WiFi; "ap" = broadcast hotspot
  # --- Client network (the WiFi the TNC should JOIN, if any) ---
  client_ssid: ''           # home/shop WiFi to join. BLANK -> boot straight to AP mode.
  client_password: ''
  # If client_ssid is set but the join fails within 5 minutes, the TNC
  # automatically falls back to AP mode so it stays reachable.

# Native Python Winlink RMS gateway
rms:
  enabled: false
  cms_call: ""       # Approved gateway callsign, normally CALL-10
  cms_password: ""   # Winlink secure password
  frequency_hz: 145050000
  mode: "PACKET-1200"
